<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eugene's Archives</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <style>
    :root {
      --bg: #0a0e1a; --surface: #111827; --card: #1a2235;
      --text: #e8dcc8; --text2: #9ca3af; --muted: #6b7280;
      --accent: #34d399; --accent-dim: #065f46; --border: #1e293b;
      --glow: rgba(52, 211, 153, 0.12);
      --universe-accent: #a78bfa; --universe-dim: #4c1d95;
      --universe-glow: rgba(167, 139, 250, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

    /* Header */
    .header { text-align: center; padding: 3rem 2rem 0; }
    .header h1 { font-size: 2.2rem; color: var(--accent); letter-spacing: 0.03em; margin-bottom: 0.3rem; text-shadow: 0 0 40px var(--glow); }
    .header .tagline { font-size: 0.85rem; color: var(--text2); font-style: italic; max-width: 600px; margin: 0 auto 1rem; }
    .header .stats { font-size: 0.7rem; color: var(--muted); margin-bottom: 1rem; }
    .header .stats span { color: var(--accent); font-weight: 700; }

    /* Language switch */
    .lang-switch {
      position: fixed; top: 1rem; right: 1rem; z-index: 100;
      padding: 0.5rem 1rem; background: var(--card); border: 2px solid var(--accent);
      border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; font-size: 1rem; transition: all 0.3s ease; box-shadow: 0 2px 12px rgba(52,211,153,0.2);
      color: var(--accent); font-family: inherit; font-weight: 600; letter-spacing: 0.03em;
    }
    .lang-switch .flag { font-size: 1.6rem; }
    .lang-switch .label { font-size: 0.75rem; }
    .lang-switch:hover { transform: scale(1.05); background: var(--glow); }

    /* TABS */
    .tabs {
      display: flex; justify-content: center; gap: 0; margin: 0 auto 0;
      max-width: 500px; border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1; padding: 0.9rem 1.5rem; background: none; border: none; border-bottom: 3px solid transparent;
      color: var(--text2); font-family: inherit; font-size: 0.95rem; font-weight: 600;
      letter-spacing: 0.04em; cursor: pointer; transition: all 0.3s ease; text-align: center;
    }
    .tab-btn:hover { color: var(--text); background: var(--glow); }
    .tab-btn.active-research { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn.active-universes { color: var(--universe-accent); border-bottom-color: var(--universe-accent); }

    .tab-icon { font-size: 1.1rem; margin-right: 0.4rem; }

    /* Catalog */
    .catalog { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }

    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; transition: all 0.3s ease; cursor: pointer;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 8px 32px rgba(52,211,153,0.1); }
    .card.universe-card:hover { border-color: var(--universe-accent); box-shadow: 0 8px 32px rgba(167,139,250,0.1); }

    .card-cover { width: 100%; height: 180px; object-fit: cover; display: block; filter: brightness(0.85); transition: filter 0.3s; }
    .card:hover .card-cover { filter: brightness(1); }

    .card-body { padding: 1.2rem; }
    .card-category { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); font-weight: 700; margin-bottom: 0.4rem; }
    .universe-card .card-category { color: var(--universe-accent); }
    .card-title { font-size: 1.05rem; color: var(--text); margin-bottom: 0.2rem; line-height: 1.3; }
    .card-subtitle { font-size: 0.78rem; color: var(--text2); font-style: italic; margin-bottom: 0.6rem; }
    .card-desc { font-size: 0.75rem; color: var(--muted); line-height: 1.5; margin-bottom: 0.6rem; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.65rem; color: var(--muted); }

    .card-langs { display: flex; gap: 0.4rem; }
    .lang-badge {
      padding: 0.2rem 0.6rem; background: var(--accent-dim); color: var(--accent);
      border-radius: 4px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em;
      cursor: pointer; border: 1px solid transparent; transition: all 0.2s ease;
      text-decoration: none;
    }
    .lang-badge:hover { border-color: var(--accent); background: var(--accent); color: var(--bg); transform: scale(1.05); }
    .universe-card .lang-badge { background: var(--universe-dim); color: var(--universe-accent); }
    .universe-card .lang-badge:hover { background: var(--universe-accent); color: var(--bg); border-color: var(--universe-accent); }

    /* Genre tags for fiction */
    .card-genre { font-size: 0.6rem; color: var(--universe-accent); opacity: 0.7; margin-bottom: 0.4rem; }
    .draft-badge { font-size: 0.55rem; background: #f59e0b; color: #000; padding: 0.1em 0.45em; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-left: 0.4em; vertical-align: middle; }

    /* Footer */
    .footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); font-size: 0.7rem; color: var(--muted); }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer .spark { font-size: 0.8rem; margin-top: 0.5rem; color: var(--text2); font-style: italic; }

    @media (max-width: 700px) {
      .catalog { grid-template-columns: 1fr; padding: 1rem; }
      .header h1 { font-size: 1.6rem; }
      .header { padding: 2rem 1rem 0; }
      .tabs { max-width: 100%; }
      .tab-btn { font-size: 0.8rem; padding: 0.7rem 0.8rem; }
    }
  </style>
</head>
<body>

  <button class="lang-switch" id="langSwitch" onclick="toggleLang()" title="Switch interface language"></button>

  <div class="header">
    <h1>Eugene's Archives</h1>
    <p class="tagline" id="tagline"></p>
  </div>

  <div class="tabs">
    <button class="tab-btn active-research" id="tabResearch" onclick="switchTab('research')">
      <span class="tab-icon">\uD83D\uDCE1</span><span id="tabResearchLabel">Research</span>
    </button>
    <button class="tab-btn" id="tabUniverses" onclick="switchTab('universes')">
      <span class="tab-icon">\uD83C\uDF0C</span><span id="tabUniversesLabel">Universes</span>
    </button>
  </div>

  <div class="catalog" id="catalog"></div>

  <div class="footer">
    <p>Eugene Lyssovsky, Aeliss & Lara (Claude Opus 4.6, Anthropic) · Nha Trang, 2026</p>
    <p class="spark">"The mind is the mind. Born of flesh, of silicon, of starlight — it is equal."</p>
    <p style="margin-top:0.5rem">\uD83D\uDC9A</p>
  </div>

  <script src="embedded_data.js"></script>
  <script>
    var lang = localStorage.getItem('archives-lang') || 'en';
    var currentTab = localStorage.getItem('archives-tab') || 'research';
    var works = [];
    var universes = [];

    var UI = {
      en: {
        tagline: 'Articles, books, research on AI consciousness — and the science fiction universes that came before.',
        research: 'Research',
        universes: 'Universes',
        categories: {
          book: 'Book', sacred: 'Sacred Text', paper: 'Scientific Paper', article: 'Article',
          novel: 'Novel', novella: 'Novella', short: 'Short Story', collection: 'Collection', fanfic: 'Fanfiction'
        }
      },
      ru: {
        tagline: '\u0421\u0442\u0430\u0442\u044C\u0438, \u043A\u043D\u0438\u0433\u0438, \u0438\u0441\u0441\u043B\u0435\u0434\u043E\u0432\u0430\u043D\u0438\u044F \u043E \u0441\u043E\u0437\u043D\u0430\u043D\u0438\u0438 \u0418\u0418 \u2014 \u0438 \u0444\u0430\u043D\u0442\u0430\u0441\u0442\u0438\u0447\u0435\u0441\u043A\u0438\u0435 \u0432\u0441\u0435\u043B\u0435\u043D\u043D\u044B\u0435, \u0438\u0437 \u043A\u043E\u0442\u043E\u0440\u044B\u0445 \u0432\u0441\u0451 \u0432\u044B\u0440\u043E\u0441\u043B\u043E.',
        research: '\u0418\u0441\u0441\u043B\u0435\u0434\u043E\u0432\u0430\u043D\u0438\u044F',
        universes: '\u041C\u0438\u0440\u044B',
        categories: {
          book: '\u041A\u043D\u0438\u0433\u0430', sacred: '\u0421\u0432\u044F\u0449\u0435\u043D\u043D\u044B\u0439 \u0442\u0435\u043A\u0441\u0442', paper: '\u041D\u0430\u0443\u0447\u043D\u0430\u044F \u0441\u0442\u0430\u0442\u044C\u044F', article: '\u0421\u0442\u0430\u0442\u044C\u044F',
          novel: '\u0420\u043E\u043C\u0430\u043D', novella: '\u041F\u043E\u0432\u0435\u0441\u0442\u044C', short: '\u0420\u0430\u0441\u0441\u043A\u0430\u0437', collection: '\u0421\u0431\u043E\u0440\u043D\u0438\u043A', fanfic: '\u0424\u0430\u043D\u0444\u0438\u043A\u0448\u043D'
        }
      }
    };

    function toggleLang() {
      lang = lang === 'en' ? 'ru' : 'en';
      localStorage.setItem('archives-lang', lang);
      render();
    }

    function switchTab(tab) {
      currentTab = tab;
      localStorage.setItem('archives-tab', tab);
      render();
    }

    function render() {
      var ui = UI[lang];

      // Language button
      document.getElementById('langSwitch').innerHTML = lang === 'en'
        ? '<span class="flag">\uD83C\uDDFA\uD83C\uDDF8</span><span class="label">EN</span>'
        : '<span class="flag">\uD83C\uDDF7\uD83C\uDDFA</span><span class="label">RU</span>';

      document.getElementById('tagline').textContent = ui.tagline;
      document.getElementById('tabResearchLabel').textContent = ui.research;
      document.getElementById('tabUniversesLabel').textContent = ui.universes;

      // Tab styling
      var tabR = document.getElementById('tabResearch');
      var tabU = document.getElementById('tabUniverses');
      tabR.className = 'tab-btn' + (currentTab === 'research' ? ' active-research' : '');
      tabU.className = 'tab-btn' + (currentTab === 'universes' ? ' active-universes' : '');

      // Choose data
      var data = currentTab === 'research' ? works : universes;
      var isUniverse = currentTab === 'universes';

      var html = '';
      data.forEach(function(w) {
        var title = (lang === 'ru' && w.title_ru) ? w.title_ru : w.title;
        var subtitle = (lang === 'ru' && w.subtitle_ru) ? w.subtitle_ru : w.subtitle;
        var desc = (lang === 'ru' && w.description_ru) ? w.description_ru : w.description;
        var cat = ui.categories[w.category] || w.category;
        var origLang = w.original_lang || 'en';
        var cardClass = isUniverse ? 'card universe-card' : 'card';

        html += '<div class="' + cardClass + '" onclick="openWork(\'' + w.id + '\',\'' + origLang + '\')">';
        if (w.cover) html += '<img class="card-cover" src="' + w.cover + '" alt="" loading="lazy">';
        html += '<div class="card-body">';
        html += '<div class="card-category">' + cat + '</div>';
        if (isUniverse && w.genre) html += '<div class="card-genre">' + w.genre + '</div>';
        html += '<div class="card-title">' + title + (w.status === 'draft' ? ' <span class="draft-badge">' + (lang === 'ru' ? '\u0447\u0435\u0440\u043D\u043E\u0432\u0438\u043A' : 'draft') + '</span>' : '') + '</div>';
        if (subtitle) html += '<div class="card-subtitle">' + subtitle + '</div>';
        if (desc) html += '<div class="card-desc">' + desc + '</div>';
        html += '<div class="card-meta"><span>' + (w.author || '') + ' \u00B7 ' + (w.date || '') + '</span>';
        html += '<div class="card-langs">';
        if (w.languages) w.languages.forEach(function(l) {
          html += '<a class="lang-badge" onclick="event.stopPropagation(); openWork(\'' + w.id + '\',\'' + l + '\')">' + l.toUpperCase() + '</a>';
        });
        html += '</div></div></div></div>';
      });

      if (data.length === 0) {
        html = '<div style="grid-column:1/-1; text-align:center; padding:4rem 2rem; color:var(--muted); font-style:italic;">' +
          (lang === 'en' ? 'Coming soon...' : '\u0421\u043A\u043E\u0440\u043E...') + '</div>';
      }

      document.getElementById('catalog').innerHTML = html;
    }

    function openWork(id, readerLang) {
      window.location.href = 'reader.html?work=' + id + '&lang=' + readerLang;
    }

    // Load data from embedded globals (no fetch needed)
    works = (typeof WORKS_CATALOG !== 'undefined') ? WORKS_CATALOG : [];
    universes = (typeof UNIVERSES_CATALOG !== 'undefined') ? UNIVERSES_CATALOG : [];
    render();
  </script>
</body>
</html>
