name: Build Eugene's Archives APK

on:
  push:
    branches: [master, "claude/**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Android repo
        uses: actions/checkout@v4
        with:
          path: android

      - name: Checkout source archives (elyssov/eugenes-archives)
        uses: actions/checkout@v4
        with:
          repository: elyssov/eugenes-archives
          path: source
          ref: master

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Regenerate embedded_data.js from source
        working-directory: android
        env:
          EUGENES_SOURCE_DIR: ${{ github.workspace }}/source
          EUGENES_OUTPUT_DIR: ${{ github.workspace }}/android/app/src/main/assets
        run: python3 build_apk_data.py

      - name: Generate release keystore
        working-directory: android
        run: |
          keytool -genkey -v -keystore app/archives-release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias archives \
            -storepass archives2026 \
            -keypass archives2026 \
            -dname "CN=Eugenes Archives, O=Elyssov, L=NhaTrang, C=VN"

      - name: Build signed APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: archives2026
          KEY_ALIAS: archives
          KEY_PASSWORD: archives2026
        run: gradle -p . assembleRelease

      - name: Collect APK
        working-directory: android
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk dist/eugenes-archives.apk
          ls -la dist/

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: eugenes-archives-apk
          path: android/dist/eugenes-archives.apk

      - name: Compute build tag
        id: tag
        run: echo "tag=build-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Publish Release with APK
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ github.repository }}
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Eugene's Archives ${{ steps.tag.outputs.tag }}
          body: |
            Automated build from `${{ github.ref_name }}` @ `${{ github.sha }}`.
            Built against `elyssov/eugenes-archives@master`.
          files: android/dist/eugenes-archives.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
