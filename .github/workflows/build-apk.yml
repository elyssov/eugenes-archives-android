name: Build Eugene's Archives APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore app/archives-release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias archives \
            -storepass archives2026 \
            -keypass archives2026 \
            -dname "CN=Eugenes Archives, O=Elyssov, L=NhaTrang, C=VN"

      - name: Build signed APK
        env:
          KEYSTORE_PASSWORD: archives2026
          KEY_ALIAS: archives
          KEY_PASSWORD: archives2026
        run: gradle -p . assembleRelease

      - name: Collect APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/*.apk dist/eugenes-archives.apk
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: eugenes-archives-apk
          path: dist/eugenes-archives.apk
